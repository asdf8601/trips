title: "Japón 2026: Naturaleza, Aventura y Cultura"
start_date: "2026-07-30"
end_date: "2026-08-20"
description: |
  Viaje de 21 días por Japón enfocado en **Slow Travel**, los Alpes Japoneses y cultura sin prisas.
  
  ## Filosofía
  - Ritmo relajado, sin prisas por "tachar" sitios turísticos
  - Aventura y naturaleza: escalada, senderismo, onsen
  - Comida callejera y cultura local
public: true
budget_total: 6800.00
local_currency: "JPY"
stops:
  - name: "Tokyo (Inicio)"
    location: "Tokyo, Japón"
    visit_date: "2026-07-30"
    arrival_date: "2026-07-30"
    departure_date: "2026-08-04"
    notes: "Días 1-5: Asakusa, Modernidad y Monte Mitake. Base en Old Tokyo."
    latitude: 35.7148
    longitude: 139.7967
    activities:
      - title: "Visit Japan Web & Suica"
        content: |
          Rellenar Visit Japan Web antes de volar.
          Añadir Suica a Apple Wallet o comprar Pasmo Passport.
        type: "tip"
      - title: "Cena en Ramen Street"
        content: "Tokyo Station. Varios restaurantes de ramen de distintas regiones."
        type: "restaurant"
        price: 15.00
        duration: "1 hour"
      - title: "Senso-ji Temple"
        content: "El templo más antiguo. Ir a las 6:30 AM para silencio."
        type: "place"
        rating: 5
        duration: "2 hours"
      - title: "Parque Ueno"
        content: "Museos, zoo y paseo tranquilo."
        type: "place"
        duration: "3 hours"
      - title: "Senderismo Monte Mitake"
        content: "Escapada verde. Tren directo 1.5h. Cedros sagrados."
        type: "activity"
        rating: 5
        duration: "6 hours"
      - title: "Gobierno Metropolitano & Shinjuku"
        content: "Vistas gratis planta 45. Cena en Omoide Yokocho (callejón yakitori)."
        type: "place"
        rating: 5
        duration: "3 hours"
      - title: "B-Pump Ogikubo (Escalada)"
        content: "Rocódromo boulder de clase mundial."
        type: "activity"
        price: 25.00
        duration: "3 hours"
      - title: "Takkyubin (Envío maletas)"
        content: "Enviar maleta grande a Kyoto para viajar ligero a los Alpes."
        type: "tip"
        price: 20.00

  - name: "Matsumoto"
    location: "Matsumoto, Nagano, Japón"
    visit_date: "2026-08-04"
    arrival_date: "2026-08-04"
    departure_date: "2026-08-05"
    notes: "Día 6: Castillo Negro y puerta de entrada a los Alpes."
    latitude: 36.2381
    longitude: 137.9720
    activities:
      - title: "Castillo de Matsumoto"
        content: "El 'Cuervo Negro'. Castillo original de madera."
        type: "place"
        rating: 5
        duration: "2 hours"

  - name: "Hirayu Onsen"
    location: "Hirayu Onsen, Gifu, Japón"
    visit_date: "2026-08-05"
    arrival_date: "2026-08-05"
    departure_date: "2026-08-08"
    notes: "Días 7-9: Alpes Japoneses. Kamikochi, Onsen y Shinhotaka Ropeway."
    latitude: 36.2283
    longitude: 137.5933
    activities:
      - title: "Relax en Onsen"
        content: "Aguas termales al aire libre en los Alpes."
        type: "activity"
        rating: 5
      - title: "Kamikochi Trekking"
        content: "**Highlight.** Valle alpino del río Azusa. Paisaje espectacular."
        type: "activity"
        rating: 5
        duration: "6 hours"
      - title: "Shinhotaka Ropeway"
        content: "Teleférico de dos pisos. Vistas a 2156m."
        type: "activity"
        rating: 5
        price: 30.00

  - name: "Nakatsugawa"
    location: "Nakatsugawa, Gifu, Japón"
    visit_date: "2026-08-08"
    arrival_date: "2026-08-08"
    departure_date: "2026-08-11"
    notes: "Días 10-12: Ruta Nakasendo (Magome-Tsumago). La ruta de los samuráis."
    latitude: 35.4883
    longitude: 137.5006
    activities:
      - title: "Ruta Nakasendo (Magome-Tsumago)"
        content: "Caminata histórica 8km entre pueblos postales de madera."
        type: "activity"
        rating: 5
        duration: "4 hours"

  - name: "Kyoto"
    location: "Kyoto, Japón"
    visit_date: "2026-08-11"
    arrival_date: "2026-08-11"
    departure_date: "2026-08-17"
    notes: "Días 13-18: Corazón cultural. Templos, Gion, Nara y Arashiyama."
    latitude: 35.0116
    longitude: 135.7681
    activities:
      - title: "Paseo Pontocho"
        content: "Callejón de geishas y restaurantes junto al río."
        type: "place"
        rating: 4
      - title: "Kinkaku-ji & Ryoan-ji"
        content: "Pabellón Dorado y jardín zen. Ir en bici."
        type: "place"
        rating: 5
        duration: "3 hours"
      - title: "Fushimi Inari Taisha"
        content: "Mil toriis. Subir a la cima para evitar gente."
        type: "place"
        rating: 5
        duration: "3 hours"
      - title: "Excursión a Nara"
        content: "Todai-ji (Gran Buda) y ciervos sagrados."
        type: "activity"
        rating: 5
        duration: "5 hours"
      - title: "Arashiyama (Adashino)"
        content: "Templo Adashino Nenbutsu-ji (bambú sin turistas)."
        type: "place"
        rating: 5
      - title: "Mercado Nishiki"
        content: "Comida y compras antes de irse."
        type: "place"
        rating: 4

  - name: "Tokyo (Final)"
    location: "Shinjuku, Tokyo, Japón"
    visit_date: "2026-08-17"
    arrival_date: "2026-08-17"
    departure_date: "2026-08-19"
    notes: "Días 19-21: Compras finales, TeamLab y despedida."
    latitude: 35.6938
    longitude: 139.7034
    activities:
      - title: "TeamLab Planets"
        content: "Arte digital inmersivo. Reservar con antelación."
        type: "activity"
        rating: 5
        price: 35.00
      - title: "Compras Finales"
        content: "Uniqlo Ginza, Don Quijote, 7-Eleven snacks."
        type: "activity"

