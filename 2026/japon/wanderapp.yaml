description: |
  Viaje de 21 días por Japón enfocado en **Slow Travel**, los Alpes Japoneses y cultura sin prisas.
  
  ## Filosofía
  - Ritmo relajado, sin prisas por "tachar" sitios turísticos
  - Aventura y naturaleza: escalada, senderismo, onsen
  - Comida callejera y cultura local
  
  ## Highlights
  - Tokyo: Tradición y modernidad
  - Alpes Japoneses: Matsumoto, Kamikochi, Hirayu Onsen
  - Ruta Nakasendo: Magome-Tsumago (camino de los samuráis)
  - Kyoto: El corazón cultural de Japón
