posts:
  # === DÍA 1 ===
  - stop: "Día 1: Llegada a Tokyo"
    title: "Traslado Haneda → Asakusa"
    content: |
      Monorraíl + Yamanote. Traslado escénico y rápido.
      Comprar Suica/Pasmo en el aeropuerto.
      
      🔍 [Buscar en Google](https://www.google.com/search?q=Haneda+Airport+to+Asakusa+transfer+Tokyo)
    type: "transport"
    duration: "1.5 hours"

  - stop: "Día 1: Llegada a Tokyo"
    title: "Cena en Ramen Street"
    content: |
      En Tokyo Station. Varios restaurantes de ramen de distintas regiones.
      Perfecto para la primera cena tras llegar.
      
      🔍 [Buscar en Google](https://www.google.com/search?q=Tokyo+Station+Ramen+Street)
    type: "restaurant"
    price: 15.00
    duration: "1 hour"

  - stop: "Día 1: Llegada a Tokyo"
    title: "Tip: Suica/Pasmo"
    content: |
      Tarjeta monedero para todo: tren, bus, konbini.
      iPhone: Añadir en Apple Wallet. Android: tarjeta física.
    type: "tip"

  # === DÍA 2 ===
  - stop: "Día 2: Tokyo Tradición"
    title: "Senso-ji Temple"
    content: |
      El templo más antiguo de Tokyo.
      **Tip:** Ir a las 6:30 AM para silencio y fotos perfectas.
      
      🔍 [Buscar en Google](https://www.google.com/search?q=Senso-ji+Temple+Asakusa+Tokyo)
    type: "place"
    rating: 5
    duration: "2 hours"
    latitude: 35.7148
    longitude: 139.7967

  - stop: "Día 2: Tokyo Tradición"
    title: "Parque Ueno"
    content: |
      Museos y paseo tranquilo.
      Museo Nacional de Tokyo y zoo.
      
      🔍 [Buscar en Google](https://www.google.com/search?q=Ueno+Park+Tokyo)
    type: "place"
    duration: "3 hours"

  - stop: "Día 2: Tokyo Tradición"
    title: "Paseo Río Sumida"
    content: |
      Atardecer junto al río. Vistas al Tokyo Skytree.
      
      🔍 [Buscar en Google](https://www.google.com/search?q=Sumida+River+walk+Tokyo+Skytree)
    type: "place"
    duration: "1.5 hours"

  # === DÍA 3 ===
  - stop: "Día 3: Monte Mitake"
    title: "Senderismo Monte Mitake"
    content: |
      Tren directo desde Shinjuku (1.5h).
      Senderismo entre cedros sagrados y santuarios.
      Escapada perfecta del caos urbano.
      
      🔍 [Buscar en Google](https://www.google.com/search?q=Mount+Mitake+hiking+Tokyo)
    type: "activity"
    rating: 5
    duration: "6 hours"

  # === DÍA 4 ===
  - stop: "Día 4: Tokyo Neón"
    title: "Gobierno Metropolitano de Tokyo"
    content: |
      Vistas gratis desde la planta 45.
      Mejor al atardecer.
      
      🔍 [Buscar en Google](https://www.google.com/search?q=Tokyo+Metropolitan+Government+Building+observation+deck)
    type: "place"
    duration: "1 hour"

  - stop: "Día 4: Tokyo Neón"
    title: "Shibuya Crossing"
    content: |
      El cruce más famoso del mundo. Mejor visto desde Starbucks.
      
      🔍 [Buscar en Google](https://www.google.com/search?q=Shibuya+Crossing+Tokyo)
    type: "place"
    duration: "30 minutes"

  - stop: "Día 4: Tokyo Neón"
    title: "Cena en Omoide Yokocho"
    content: |
      Callejón de yakitori (brochetas) en Shinjuku.
      Ambiente auténtico y ruidoso.
      
      🔍 [Buscar en Google](https://www.google.com/search?q=Omoide+Yokocho+Shinjuku+Tokyo)
    type: "restaurant"
    rating: 5
    price: 20.00
    duration: "1.5 hours"

  # === DÍA 5 ===
  - stop: "Día 5: Tokyo Libre"
    title: "B-Pump Ogikubo (Escalada)"
    content: |
      Rocódromo boulder. Buena opción para día activo.
      Alquiler de pies de gato disponible.
      
      🔍 [Buscar en Google](https://www.google.com/search?q=B-Pump+Ogikubo+bouldering+Tokyo)
    type: "activity"
    price: 25.00
    duration: "3 hours"

  - stop: "Día 5: Tokyo Libre"
    title: "Takkyubin - Envío de equipaje"
    content: |
      Enviar maleta grande de Tokyo a Kyoto (~20€).
      Preguntar en recepción: "Yamato Transport".
      Imprescindible para viajar ligero por los Alpes.
    type: "tip"
    price: 20.00

  # === DÍA 6 ===
  - stop: "Día 6: Matsumoto"
    title: "Tren Azusa"
    content: |
      Tren escénico Tokyo → Matsumoto (2.5h). Vistas de montañas.
      
      🔍 [Buscar en Google](https://www.google.com/search?q=Azusa+train+Tokyo+Matsumoto)
    type: "transport"
    duration: "2.5 hours"

  - stop: "Día 6: Matsumoto"
    title: "Castillo de Matsumoto"
    content: |
      El "Cuervo Negro". Uno de los pocos castillos originales.
      No es reconstrucción de hormigón.
      **Tip:** Ir temprano para evitar colas.
      
      🔍 [Buscar en Google](https://www.google.com/search?q=Matsumoto+Castle+Japan)
    type: "place"
    rating: 5
    duration: "2 hours"
    latitude: 36.2381
    longitude: 137.9720

  # === DÍA 7 ===
  - stop: "Día 7: Hirayu Onsen"
    title: "Bus a Hirayu"
    content: |
      Bus desde Matsumoto (1h). Paisajes de montaña.
      
      🔍 [Buscar en Google](https://www.google.com/search?q=Matsumoto+to+Hirayu+Onsen+bus)
    type: "transport"
    duration: "1 hour"

  - stop: "Día 7: Hirayu Onsen"
    title: "Onsen al aire libre"
    content: |
      Relax en aguas termales rodeado de montañas.
      Experiencia japonesa auténtica.
      Incluido en el ryokan.
      
      🔍 [Buscar en Google](https://www.google.com/search?q=Hirayu+Onsen+outdoor+bath+Japan)
    type: "activity"
    rating: 5
    duration: "2 hours"

  # === DÍA 8 ===
  - stop: "Día 8: Kamikochi"
    title: "Senderismo Kamikochi"
    content: |
      **La joya alpina.** El paisaje más bonito de Japón.
      Senderismo plano por el valle del río Azusa.
      
      **Nota ética:** Macacos salvajes. No acercarse ni mostrar comida.
      
      🔍 [Buscar en Google](https://www.google.com/search?q=Kamikochi+hiking+Japanese+Alps)
    type: "activity"
    rating: 5
    duration: "6 hours"

  # === DÍA 9 ===
  - stop: "Día 9: Shinhotaka Ropeway"
    title: "Shinhotaka Ropeway"
    content: |
      Teleférico sobre las nubes. Subida a 2,156m.
      Vistas espectaculares de los Alpes Japoneses.
      
      🔍 [Buscar en Google](https://www.google.com/search?q=Shinhotaka+Ropeway+Japan)
    type: "activity"
    rating: 5
    price: 30.00
    duration: "3 hours"

  - stop: "Día 9: Shinhotaka Ropeway"
    title: "Traslado a Nakatsugawa"
    content: |
      Bus a Takayama + tren a Nakatsugawa.
      
      🔍 [Buscar en Google](https://www.google.com/search?q=Shinhotaka+to+Nakatsugawa+via+Takayama)
    type: "transport"
    duration: "4 hours"

  # === DÍA 10 ===
  - stop: "Día 10: Nakatsugawa"
    title: "Día de descanso"
    content: |
      Llegada y relax. Explorar el pueblo.
      Preparar la caminata del día siguiente.
    type: "tip"

  # === DÍA 11 ===
  - stop: "Día 11: Ruta Magome-Tsumago"
    title: "Caminata Nakasendo"
    content: |
      **La antigua ruta de los samuráis.**
      8km de sendero histórico empedrado.
      Bosques, cascadas y pueblos de madera preservados.
      
      Bus de vuelta disponible desde Tsumago.
      
      🔍 [Buscar en Google](https://www.google.com/search?q=Magome+Tsumago+Nakasendo+trail+Japan)
    type: "activity"
    rating: 5
    duration: "4 hours"

  # === DÍA 12 ===
  - stop: "Día 12: Traslado a Kyoto"
    title: "Tren a Kyoto"
    content: |
      Tren vía Nagoya. Shinkansen desde Nagoya a Kyoto.
      
      🔍 [Buscar en Google](https://www.google.com/search?q=Nakatsugawa+to+Kyoto+train+via+Nagoya)
    type: "transport"
    duration: "3 hours"

  # === DÍA 13 ===
  - stop: "Día 13: Llegada a Kyoto"
    title: "Paseo nocturno Pontocho"
    content: |
      Callejón tradicional con restaurantes y geishas.
      Perfecto para la primera noche en Kyoto.
      
      🔍 [Buscar en Google](https://www.google.com/search?q=Pontocho+alley+Kyoto)
    type: "place"
    rating: 4
    duration: "2 hours"

  # === DÍA 14 ===
  - stop: "Día 14: Kyoto Norte en Bici"
    title: "Kinkaku-ji (Pabellón Dorado)"
    content: |
      Templo cubierto de pan de oro reflejado en el lago.
      Icono de Kyoto.
      
      🔍 [Buscar en Google](https://www.google.com/search?q=Kinkaku-ji+Golden+Pavilion+Kyoto)
    type: "place"
    rating: 5
    duration: "1.5 hours"

  - stop: "Día 14: Kyoto Norte en Bici"
    title: "Ryoan-ji"
    content: |
      El jardín zen de piedras más famoso del mundo.
      15 rocas, solo puedes ver 14 desde cualquier ángulo.
      
      🔍 [Buscar en Google](https://www.google.com/search?q=Ryoan-ji+zen+garden+Kyoto)
    type: "place"
    rating: 5
    duration: "1 hour"

  # === DÍA 15 ===
  - stop: "Día 15: Fushimi Inari"
    title: "Fushimi Inari Taisha"
    content: |
      Miles de torii gates naranjas.
      
      **Tip:** Ir a las 7:00 AM. Subida completa al monte (2h) 
      para huir de la multitud de la base.
      
      🔍 [Buscar en Google](https://www.google.com/search?q=Fushimi+Inari+Taisha+Kyoto)
    type: "place"
    rating: 5
    duration: "3 hours"
    latitude: 34.9671
    longitude: 135.7727

  # === DÍA 16 ===
  - stop: "Día 16: Excursión a Nara"
    title: "Todai-ji (Gran Buda)"
    content: |
      La estatua de bronce más grande del mundo.
      Edificio de madera impresionante.
      
      🔍 [Buscar en Google](https://www.google.com/search?q=Todai-ji+Great+Buddha+Nara)
    type: "place"
    rating: 5
    duration: "2 hours"

  - stop: "Día 16: Excursión a Nara"
    title: "Nara Park"
    content: |
