# Camboya 2026: The "Anti-Crowd" Challenge (Slow & Deep)
# Generado para importar en Wander App
# Estructura: Una parada por día con posts asignados

title: "Camboya 2026: Slow & Deep"
start_date: "2026-07-29"
end_date: "2026-08-25"
description: |
  Viaje de 27 días por Camboya con filosofía **"Viajar Lento para Ver Más"**.
  
  ## Filosofía
  Se han eliminado los "puntos negros" de turismo masivo y los desvíos agotadores 
  para priorizar la inmersión cultural y el relax real.
  
  ## Highlights
  - Siem Reap: Angkor sin prisas, templos lejanos y vida local
  - Battambang: La Camboya rural auténtica
  - Kampot & Kep: El sur colonial, pimienta y cangrejos
  - Koh Rong Sanloem: Desconexión total, solo mar y libros
  - Phnom Penh: Entender el pasado antes de irse
public: true
budget_total: 6250.00
local_currency: "USD"

