title: "Camboya 2026: Slow & Deep"
start_date: "2026-07-29"
end_date: "2026-08-25"
description: |
  Viaje de 27 días por Camboya con filosofía **"Viajar Lento para Ver Más"**.
  Profundizando en la cultura jemer más allá de Angkor Wat.
  
  ## Highlights
  - Siem Reap: 8 días para ver templos remotos sin gente
  - Battambang: La joya colonial y rural
  - Kampot: Pimienta, río y relax sureño
  - Koh Rong Sanloem: Isla paradisíaca sin carreteras
  - Phnom Penh: Historia reciente y renacimiento
