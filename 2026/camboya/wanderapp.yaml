# ============================================
# POSTS (Experiencias por día)
# ============================================
posts:
  # === DÍA 1 ===
  - stop: "Día 1: Llegada a Siem Reap"
    title: "Cena tranquila de llegada"
    content: |
      Descansar tras el vuelo largo. Cenar algo ligero cerca del hotel.
      
      🔍 [Buscar en Google](https://www.google.com/search?q=best+restaurants+Siem+Reap+Cambodia)
    type: "restaurant"
    price: 15.00

  - stop: "Día 1: Llegada a Siem Reap"
    title: "Tip: Visa on Arrival"
    content: |
      $30 USD en el aeropuerto.
      Llevar foto carnet y billetes nuevos de dólar.
    type: "tip"

  - stop: "Día 1: Llegada a Siem Reap"
    title: "Tip: PassApp/Grab"
    content: "Imprescindible para pedir tuk-tuks sin regatear."
    type: "tip"

  - stop: "Día 1: Llegada a Siem Reap"
    title: "Tip: Dólar vs Riel"
    content: |
      USD para pagos grandes, Riel para cambios pequeños.
      Billetes USD deben estar IMPOLUTOS.
    type: "tip"

  # === DÍA 2 ===
  - stop: "Día 2: Angkor Anti-Crowd"
    title: "Preah Khan"
    content: |
      Templo selvático con pasillos interminables.
      Árboles engullendo piedras.
      Ir a primera hora.
      
      🔍 [Buscar en Google](https://www.google.com/search?q=Preah+Khan+temple+Angkor+Cambodia)
    type: "place"
    rating: 5
    duration: "2 hours"

  - stop: "Día 2: Angkor Anti-Crowd"
    title: "Neak Pean"
    content: |
      Templo isla en medio de un estanque.
      Arquitectura única. Muy fotogénico.
      
      🔍 [Buscar en Google](https://www.google.com/search?q=Neak+Pean+temple+Angkor+Cambodia)
    type: "place"
    rating: 4
    duration: "1 hour"

  # === DÍA 3 ===
  - stop: "Día 3: Banteay Srei"
    title: "Banteay Srei"
    content: |
      El templo de las mujeres. Las tallas más detalladas de Angkor.
      **Tip:** Ir a las 7:00 AM antes de los buses.
      
      🔍 [Buscar en Google](https://www.google.com/search?q=Banteay+Srei+temple+Cambodia)
    type: "place"
    rating: 5
    duration: "2 hours"

  - stop: "Día 3: Banteay Srei"
    title: "Museo de Minas (Landmine Museum)"
    content: |
      Historia del desminado en Camboya.
      Fundado por un ex-soldado. Emotivo y educativo.
      
      🔍 [Buscar en Google](https://www.google.com/search?q=Cambodia+Landmine+Museum+Siem+Reap)
    type: "place"
    rating: 4
    duration: "1.5 hours"
    price: 5.00

  # === DÍA 4 ===
  - stop: "Día 4: Beng Mealea & Koh Ker"
    title: "Beng Mealea"
    content: |
      Templo engullido por la selva.
      Menos restaurado, más aventura.
      
      🔍 [Buscar en Google](https://www.google.com/search?q=Beng+Mealea+temple+Cambodia)
    type: "place"
    rating: 5
    duration: "2 hours"

  - stop: "Día 4: Beng Mealea & Koh Ker"
    title: "Koh Ker (Pirámide Perdida)"
    content: |
      Pirámide de 7 niveles en medio de la selva.
      Menos turistas que Angkor principal.
      
      🔍 [Buscar en Google](https://www.google.com/search?q=Koh+Ker+pyramid+temple+Cambodia)
    type: "place"
    rating: 5
    duration: "2 hours"
    price: 50.00

  # === DÍA 5 ===
  - stop: "Día 5: Kompong Khleang"
    title: "Pueblo de Palafitos"
    content: |
      Vida local auténtica en el lago Tonle Sap.
      Casas sobre pilotes, pescadores reales.
      No turístico como Kompong Phluk.
      
      🔍 [Buscar en Google](https://www.google.com/search?q=Kompong+Khleang+floating+village+Cambodia)
    type: "place"
    rating: 4
    duration: "4 hours"

  # === DÍA 6 ===
  - stop: "Día 6: Día Slow"
    title: "Clase de Cocina Jemer"
    content: |
      Aprender a hacer *Fish Amok* y *Lok Lak*.
      Recomendado: Beyond Unique Escapes o Paper Tiger.
      
      🔍 [Buscar en Google](https://www.google.com/search?q=Khmer+cooking+class+Siem+Reap)
    type: "activity"
    rating: 5
    duration: "4 hours"
    price: 35.00

  - stop: "Día 6: Día Slow"
    title: "Masaje Camboyano"
    content: |
      Relax merecido. Masajes económicos y de calidad.
      
      🔍 [Buscar en Google](https://www.google.com/search?q=best+massage+spa+Siem+Reap)
    type: "activity"
    rating: 4
    duration: "2 hours"
    price: 15.00

  # === DÍA 7 ===
  - stop: "Día 7: Elefantes"
    title: "Kulen Elephant Forest"
    content: |
      Santuario de elefantes ético cerca de Siem Reap.
      
      **Nota ética:** Observación solamente.
      NO montar, NO bañar (estrés para el animal).
      Se camina junto a ellos respetando su espacio.
      
      🔍 [Buscar en Google](https://www.google.com/search?q=Kulen+Elephant+Forest+ethical+sanctuary+Cambodia)
    type: "activity"
    rating: 5
    duration: "4 hours"
    price: 60.00

  # === DÍA 8 ===
  - stop: "Día 8: Circo y Mercados"
    title: "Psar Chaa (Old Market)"
