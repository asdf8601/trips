# Vietnam + Bali 2026: "De los Arrozales al Paraiso"
# Generado para importar en Wander App
# Estructura: Una parada por día con posts asignados

title: "Vietnam + Bali 2026: Slow & Deep"
start_date: "2026-07-28"
end_date: "2026-08-28"
description: |
  Viaje combinado de 32 días: 15 días en Vietnam + 18 días en Bali.
  
  ## Filosofía
  "Menos destinos, más profundidad. Madrugamos para evitar masas."
  
  ## Highlights Vietnam
  - Hanoi: El caos controlado, street food real
  - Ninh Binh: La bahía terrestre
  - Bahía de Halong: Crucero en el karst
  - Hoi An: Estrategia periférica (dormir fuera, visitar dentro)
  - Hue: Slow life imperial
  - Ho Chi Minh: La gran urbe del sur
  
  ## Highlights Bali
  - Ubud: Corazón cultural, arrozales, templos
  - Monte Batur: Amanecer volcánico
  - Amed: Costa salvaje, buceo
  - Munduk: Lagos y cascadas
  - Uluwatu: Acantilados y surf (Estancia extendida)
  
  ## Logística
  Entrada: Hanoi (HAN) → Salida: Bali (DPS)
  Vuelo intermedio: Ho Chi Minh → Bali (Kuta/DPS)
public: true
budget_total: 8742.26
local_currency: "EUR"

