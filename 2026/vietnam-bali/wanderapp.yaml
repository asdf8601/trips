title: "Vietnam + Bali 2026: Slow & Deep (Active → Chill)"
start_date: "2026-07-28"
end_date: "2026-08-28"
description: |
  Viaje 30 días: Vietnam (12N) ruta clásica N→S + Bali/Gili (18N) buceo + relax.

  ## Reservas Confirmadas
  - Vuelos Qatar (MAD-HAN) / Emirates (DPS-MAD)
  - Hotel Hanoi: TrangTrang Boutique Hotel (29-31 Jul)
  - Crucero Halong: Swan Cruises (31 Jul - 2 Ago)
  - Hotel Amed: Pondok Wisata Balty Bali (10-16 Ago)
  - Hotel Gili Air: Talent Sunset Villa (16-19 Ago)
  - Hotel Sidemen: Giri Carik (19-24 Ago)
  - Hotel Uluwatu: The Inn Possible (24-28 Ago)
  - Hotel Ninh Binh: Tam Coc Serenity Hotel & Bungalow (2-4 Ago)
  - Hotel Hue: Kha Hostel (4-5 Ago, uso día 5 post-sleeper)
  - Hotel Hoi An: Hoianese Tranquil Heritage Hotel (5-9 Ago)
  - Hotel HCM: Little Saigon Boutique Hotel (9-10 Ago)
  - ✅ TODOS LOS ALOJAMIENTOS CONFIRMADOS (10/10 bases)
  - Vuelo DAD-SGN: VietJet 9 Ago 10:50 (Ref 40-979325634)
  - Vuelo SGN-DPS: VietJet 10 Ago 08:15 (Ref 40-979187197)

  ## Filosofía
  "Ruta estándar Vietnam (Hanoi-Halong-Ninh Binh-Hue-Hoi An-HCM) + Bali profundo con buceo.
  6 bases Vietnam + 4 Bali = 10 bases en 30N."

  ## Cambios mayo 2026 (ruta clásica N→S + Sidemen extendido)
  - Quitados: Phong Nha, Ben Tre, Sapa, Pu Luong
  - Vietnam 12N (6 bases) + Bali 18N
  - Ninh Binh 2N (karst + Trang An + Mua Cave)
  - Hue 1N (ciudadela + tumbas)
  - Hoi An 4N (casco + cocina + Cham + My Son)
  - HCM 1N (Museo Guerra + street food)
  - Amed 6N base buceo principal (USS Liberty + Seraya + Drop Off + Batur)
  - Gili Air 3N intenso (buceo Shark Point/Hans Reef + tortugas + sunset)
  - Sidemen 5N descompresión (arrozales + day-trips Lempuyang/Tirta/Tukad/rafting)
  - Uluwatu 4N (Penida + templos + playas + spa final)

