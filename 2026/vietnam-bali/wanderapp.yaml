title: "Vietnam + Bali 2026: Slow & Deep (Active → Chill)"
start_date: "2026-07-28"
end_date: "2026-08-28"
description: |
  Viaje 30 días: Vietnam (16N) cultura+aventura + Bali/Gili (14N) relax.

  ## Reservas Confirmadas
  - Vuelos Qatar (MAD-HAN) / Emirates (DPS-MAD)
  - Hotel Hanoi: Amanda Boutique (29-31 Jul)
  - Crucero Halong: Swan Cruises (31 Jul - 2 Ago)

  ## Filosofía
  "Naturaleza fuerte + buceo + comida local + tranquilidad + aventura controlada.
  Menos destinos, más profundidad. 5 bases Vietnam + 4 Bali = 9 bases en 30N."

  ## Cambios mayo 2026 (Opción B + Amed extendido)
  - Quitados: Sapa, Ninh Binh, Pu Luong, HCMC
  - Vietnam 14N + Bali 16N (2N movidas de Hoi An a Amed)
  - Phong Nha 3N cuevas
  - Hoi An 4N (casco + cocina + Cham + My Son)
  - Ben Tre 3N inmersión Mekong
  - Amed 6N base buceo principal (USS Liberty + Seraya + Drop Off + Batur)
  - Gili Air 4N, Sidemen 3N, Uluwatu 3N
public: true
budget_total: 9262.82
local_currency: "EUR"
