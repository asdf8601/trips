# ============================================
# POSTS (Experiencias por día)
# ============================================
posts:
  # === VIETNAM ===
  - stop: "Día 1 (Hanoi): Llegada"
    title: "Tip: E-Visa Vietnam"
    content: |
      Españoles: 15 días sin visa.
      Si necesitas más: E-visa $25 en evisa.xuatnhapcanh.gov.vn
    type: "tip"

  - stop: "Día 1 (Hanoi): Llegada"
    title: "Tip: Grab"
    content: "El Uber de Vietnam. Usarlo para todo en ciudades."
    type: "tip"

  - stop: "Día 2 (Hanoi): Cultural"
    title: "Templo de la Literatura"
    content: |
      Primera universidad de Vietnam (1070).
      Ir temprano (7:30) para evitar grupos.
      
      🔍 [Google](https://www.google.com/search?q=Temple+of+Literature+Hanoi)
    type: "place"
    rating: 5
    duration: "2 hours"

  - stop: "Día 3 (Hanoi): Cocina y Mercados"
    title: "Clase de Cocina"
    content: |
      Pho, spring rolls, banh mi.
      Incluye visita al mercado.
      
      🔍 [Google](https://www.google.com/search?q=Hanoi+cooking+class)
    type: "activity"
    rating: 5
    price: 35.00
    duration: "4 hours"

  - stop: "Día 5 (Ninh Binh): Trang An y Bich Dong"
    title: "Trang An"
    content: |
      Paseo en barca entre formaciones kársticas.
      Mejor que Tam Coc (menos turístico).
      
      🔍 [Google](https://www.google.com/search?q=Trang+An+boat+tour+Ninh+Binh)
    type: "activity"
    rating: 5
    duration: "3 hours"
    price: 15.00

  - stop: "Día 7 (Halong): Crucero Día 2"
    title: "Crucero Bahía de Halong"
    content: |
      Navegar entre miles de islotes kársticos.
      Kayak, cuevas, noche en el barco.
      
      🔍 [Google](https://www.google.com/search?q=Ha+Long+Bay+cruise+2+days)
    type: "activity"
    rating: 5
    duration: "2 days"
    price: 180.00

  - stop: "Día 8 (Hanoi): Tren Nocturno"
    title: "Tren Nocturno SE3 Hanoi-Da Nang"
    content: |
      El mítico Reunification Express.
      Cabina cama blanda (soft sleeper) 4 literas.
      Salida 19:30, llegada 10:00 (~14.5h).
      
      Tips:
      - Reservar con antelación en 12go.asia o baolau.com
      - Llevar snacks, agua y tapones oídos
      - Hay restaurante en el tren
      - Sábanas incluidas, aire acondicionado
      
      🔍 [Reservar](https://www.google.com/search?q=Vietnam+train+SE3+Hanoi+Da+Nang+soft+sleeper+booking)
    type: "transport"
    rating: 5
    price: 60.00
    duration: "14.5 hours"

  - stop: "Día 9 (Hoi An): Llegada"
    title: "Hoi An Ancient Town (Tarde)"
    content: |
      Visitar por la tarde tras descansar del tren.
      Menos calor, luz bonita para fotos.
      
      🔍 [Google](https://www.google.com/search?q=Hoi+An+Ancient+Town+afternoon)
    type: "place"
    rating: 5
    duration: "3 hours"

  - stop: "Día 10 (Hoi An): Playa An Bang"
    title: "Clase de Cocina Hoi An"
    content: |
      Cao Lau, White Rose, Banh Mi.
      Capital culinaria de Vietnam.
      
      🔍 [Google](https://www.google.com/search?q=Hoi+An+cooking+class)
    type: "activity"
    rating: 5
    price: 40.00
    duration: "4 hours"

  - stop: "Día 12 (Hue): Llegada"
    title: "Hai Van Pass"
    content: |
      El paso de montaña más espectacular de Vietnam.
      Vistas al mar y montañas.
      
      🔍 [Google](https://www.google.com/search?q=Hai+Van+Pass+tour)
    type: "activity"
    rating: 5
    duration: "4 hours"

  - stop: "Día 13 (Hue): Ciudadela y Tumbas"
    title: "Ciudadela Imperial Hue"
    content: |
      Ir a las 7:00 AM para evitar grupos.
      Ciudad Púrpura Prohibida.
      
      🔍 [Google](https://www.google.com/search?q=Imperial+City+Hue)
    type: "place"
    rating: 5
    duration: "3 hours"
    price: 10.00

  - stop: "Día 13 (Hue): Ciudadela y Tumbas"
    title: "Pagoda Thien Mu"
    content: |
      La más famosa de Hue, junto al río Perfume.
      Mejor al atardecer.
      
      🔍 [Google](https://www.google.com/search?q=Thien+Mu+Pagoda+Hue)
    type: "place"
    rating: 5
    duration: "1.5 hours"

  - stop: "Día 15 (HCMC): Túneles Cu Chi"
    title: "Túneles de Cu Chi"
    content: |
      Red de túneles de la guerra.
      Ir a Ben Duoc (menos turístico que Ben Dinh).
      
      🔍 [Google](https://www.google.com/search?q=Cu+Chi+Tunnels+Ben+Duoc)
    type: "place"
    rating: 5
    duration: "4 hours"
    price: 20.00

  # === BALI ===
  - stop: "Día 16 (Ubud): Llegada a Bali"
    title: "Tip: Visa Bali"
    content: |
      VOA (Visa on Arrival): 30 días, ~35 USD.
      Se tramita en el aeropuerto.
    type: "tip"

  - stop: "Día 16 (Ubud): Llegada a Bali"
    title: "Tip: GoJek/Grab"
    content: "Apps para transporte en Bali. Mucho más baratas que taxis."
    type: "tip"

  - stop: "Día 17 (Ubud): Spa Day"
    title: "Spa Day Ubud"
    content: |
      Día de relax y spa balinés.
      Masajes tradicionales, tratamientos con flores.
      
      🔍 [Google](https://www.google.com/search?q=Ubud+spa+massage+best)
    type: "activity"
    rating: 5
    duration: "Half day"
    price: 40.00

  - stop: "Día 18 (Ubud): Monte Batur Amanecer"
    title: "Trekking Monte Batur"
    content: |
      Salida 2:00 AM. Trekking nocturno.
      Amanecer desde la cima del volcán.
      Desayuno con vistas al lago.
      
      🔍 [Google](https://www.google.com/search?q=Mount+Batur+sunrise+trek)
    type: "activity"
    rating: 5
    duration: "6 hours"
    price: 50.00

  - stop: "Día 19 (Ubud): Profundo"
    title: "Campuhan Ridge Walk"
    content: |
      Paseo entre arrozales y naturaleza.
      Mejor al amanecer.
      
      🔍 [Google](https://www.google.com/search?q=Campuhan+Ridge+Walk+Ubud)
    type: "activity"
    rating: 5
    duration: "1.5 hours"

  - stop: "Día 19 (Ubud): Profundo"
    title: "Sacred Monkey Forest"
    content: |
      Bosque lleno de monos.
      Cuidar pertenencias (te las quitan).
      
      🔍 [Google](https://www.google.com/search?q=Sacred+Monkey+Forest+Ubud)
    type: "place"
    rating: 4
    duration: "2 hours"
    price: 5.00

  - stop: "Día 19 (Ubud): Profundo"
    title: "Clase de Cocina Balinesa"
    content: |
      Mercado local + cocina tradicional.
      Nasi Goreng, satay, sambals.
      
      🔍 [Google](https://www.google.com/search?q=Ubud+cooking+class)
    type: "activity"
    rating: 5
    price: 35.00
    duration: "4 hours"

  - stop: "Día 21 (Amed): Buceo"
    title: "Buceo USS Liberty"
    content: |
      Barco hundido WWII. Tortugas, barracudas.
      Escuela Pura Vida para buceo en español.
      
      🔍 [Google](https://www.google.com/search?q=USS+Liberty+shipwreck+diving+Amed)
    type: "activity"
    rating: 5
    duration: "4 hours"
    price: 80.00

  - stop: "Día 23 (Munduk): Café y Senderismo"
    title: "Plantaciones de Café Munduk"
    content: |
      Visita a plantaciones de café y cacao.
      Cata de café Luwak tradicional.
      
      - [Plantación café Munduk](https://www.google.com/search?q=Munduk+coffee+plantation+tour)
      - [Café Luwak](https://www.google.com/search?q=Luwak+coffee+Munduk+Bali)
    type: "activity"
    rating: 5
    duration: "3 hours"
    price: 25.00

  - stop: "Día 23 (Munduk): Café y Senderismo"
    title: "Cascadas de Munduk"
    content: |
      Senderismo entre cascadas escondidas.
      
      - [Cascada Munduk](https://www.google.com/search?q=Munduk+Waterfall+Bali)
      - [Cascada Melanting](https://www.google.com/search?q=Melanting+Waterfall+Munduk)
    type: "place"
    rating: 5
    duration: "3 hours"

  - stop: "Día 24 (Uluwatu): Llegada"
    title: "Tanah Lot"
    content: |
      Templo icónico en el mar.
      **Ir al atardecer** (evitar mediodía).
      
      🔍 [Google](https://www.google.com/search?q=Tanah+Lot+Temple+sunset)
    type: "place"
    rating: 5
    duration: "2 hours"
    price: 5.00

  - stop: "Día 25 (Uluwatu): Playas y Templo"
    title: "Templo Uluwatu"
    content: |
      Sobre acantilado con vistas al mar.
      Danza Kecak al atardecer (espectáculo).
      
      🔍 [Google](https://www.google.com/search?q=Uluwatu+Temple+Kecak+dance)
    type: "place"
    rating: 5
    duration: "3 hours"
    price: 15.00

  - stop: "Día 25 (Uluwatu): Playas y Templo"
    title: "Playas Uluwatu"
    content: |
      Mejores playas surf: Padang Padang, Bingin, Balangan.
      Para principiantes hay clases.
      
      🔍 [Google](https://www.google.com/search?q=Uluwatu+beaches+surf)
    type: "place"
    rating: 5
    duration: "Half day"

  - stop: "Día 27 (Uluwatu): Día Flexible"
    title: "Opción: Nusa Penida"
    content: |
      Ferry 45 min. Acantilados espectaculares.
      Kelingking Beach, Angel's Billabong.
      Snorkel con mantarrayas.
      
      🔍 [Google](https://www.google.com/search?q=Nusa+Penida+day+trip+Kelingking)
    type: "activity"
    rating: 5
    duration: "Full day"
    price: 60.00

  # === TIPS GENERALES ===
  - stop: "Día 1 (Hanoi): Llegada"
    title: "Tip: Ética Animales"
    content: |
      - NO montar elefantes ni búfalos
      - NO alimentar monos salvajes
      - Protector solar biodegradable para buceo
    type: "tip"

  - stop: "Día 16 (Ubud): Llegada a Bali"
    title: "Tip: Moto en Bali"
    content: |
      Alquiler: 40.000-80.000 IDR/día (~4-7 EUR).
      Carnet internacional recomendado.
      Policía puede multar sin él.
    type: "tip"
