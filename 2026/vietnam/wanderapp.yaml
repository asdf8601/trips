# Vietnam 2026: The "Anti-Crowd" Challenge (Slow & Deep)
# Generado para importar en Wander App
# Estructura: Una parada por día con posts asignados

title: "Vietnam 2026: Slow & Deep"
start_date: "2026-07-29"
end_date: "2026-08-25"
description: |
  Viaje de 29 días por Vietnam con filosofía **"Huír de los grupos de banderas"**.
  
  ## Filosofía
  Se han eliminado los "puntos negros" de turismo masivo y se han sustituido 
  por alternativas auténticas y relajadas.
  
  ## Highlights
  - Hanoi: El caos controlado, street food real
  - Lan Ha Bay: Silencio en el karst (alternativa a Ha Long)
  - Ninh Binh: La bahía terrestre
  - Phong Nha: Aventura real en cuevas
  - Hue: Slow life imperial
  - Hoi An: Estrategia periférica (dormir fuera, visitar dentro)
  - Ho Chi Minh & Delta del Mekong
  
  ## Logística
  Open-Jaw: Entrada Norte (HAN) / Salida Sur (SGN)
public: true
budget_total: 6189.00
local_currency: "VND"

