title: "Vietnam 2026: Slow & Deep"
start_date: "2026-07-29"
end_date: "2026-08-25"
description: |
  Viaje de 29 días por Vietnam con filosofía **"Huír de los grupos de banderas"**.
  Eliminando puntos de turismo masivo en favor de experiencias auténticas.
  
  ## Highlights
  - Hanoi: El caos controlado y street food real
  - Lan Ha Bay: La alternativa tranquila a Ha Long
  - Phong Nha: Aventura en las cuevas más grandes del mundo
  - Hoi An: Estrategia periférica (alojarse en la playa, visitar pueblo al amanecer)
public: true
