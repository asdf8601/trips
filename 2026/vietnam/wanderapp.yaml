  - stop: "Día 1: Llegada a Hanoi"
    title: "Tip: E-Visa Vietnam"
    content: |
      Obligatorio. Tramitar en web oficial (evisa.xuatnhapcanh.gov.vn).
      Al menos 3 semanas antes. Coste $25.
    type: "tip"

  - stop: "Día 1: Llegada a Hanoi"
    title: "Tip: Grab"
    content: "El Uber de Vietnam. Usarlo para todo en ciudades."
    type: "tip"

  # === DÍA 2 ===
  - stop: "Día 2: Hanoi Alternativo"
    title: "Museo de Etnología"
    content: |
      Impresionante y vacío.
      Historia de las 54 etnias de Vietnam.
      Jardines con casas tradicionales.
      
      🔍 [Buscar en Google](https://www.google.com/search?q=Vietnam+Museum+of+Ethnology+Hanoi)
    type: "place"
    rating: 5
    duration: "3 hours"
    price: 5.00

  - stop: "Día 2: Hanoi Alternativo"
    title: "Puente Long Bien"
    content: |
      Puente histórico sobre el río Rojo.
      Vistas de la ciudad. Mejor al atardecer.
      
      🔍 [Buscar en Google](https://www.google.com/search?q=Long+Bien+Bridge+Hanoi)
    type: "place"
    rating: 4
    duration: "1 hour"

  - stop: "Día 2: Hanoi Alternativo"
    title: "Weekend Night Market"
    content: |
      Viernes a Domingo. Recorre el Old Quarter.
      Ropa, artesanía y comida callejera.
      
      🔍 [Buscar en Google](https://www.google.com/search?q=Hanoi+Night+Market+Old+Quarter)
