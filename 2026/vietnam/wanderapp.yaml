    title: "Tour Street Food"
    content: |
      Tour privado enfocado en callejones ocultos.
      
      Platos imprescindibles:
      - *Bun Cha*: Cerdo a la parrilla con fideos
      - *Egg Coffee*: Café con crema de huevo
      - *Pho*: La sopa nacional
      
      🔍 [Buscar en Google](https://www.google.com/search?q=Hanoi+street+food+tour+Bun+Cha)
