      Platos a aprender:
      - *Gado Gado*: Ensalada con salsa de cacahuete
      - *Sate Lilit*: Brochetas de pescado balinesas
      
      🔍 [Buscar en Google](https://www.google.com/search?q=Balinese+cooking+class+Sidemen+Bali)
    type: "activity"
    rating: 5
    duration: "4 hours"
    price: 35.00

  - stop: "Día 3: Cultura Balinesa en Sidemen"
    title: "Clase de Tejido Tradicional"
    content: |
      Con una familia local.
      Aprender técnicas de tejido tradicional balinés.
      
      🔍 [Buscar en Google](https://www.google.com/search?q=Traditional+weaving+class+Sidemen+Bali)
    type: "activity"
    rating: 4
