# ============================================
# POSTS (Experiencias y Actividades por día)
# ============================================
posts:
  # === DÍA 1: LLEGADA A SIDEMEN ===
  - stop: "Día 1: Llegada a Sidemen"
    title: "Visa on Arrival (VOA)"
    content: |
      500.000 IDR (~30€) al llegar al aeropuerto.
      Se puede pagar con tarjeta.
      Válida por 30 días.
    type: "tip"

  - stop: "Día 1: Llegada a Sidemen"
    title: "Transporte en Bali"
    content: |
      - **Conductor privado:** ~40-50€/día para rutas largas. Lo más cómodo.
      - **Grab/Gojek:** Para trayectos cortos. Cuidado con "zonas rojas" donde no pueden recoger (taxi local mafia).
    type: "tip"

  - stop: "Día 1: Llegada a Sidemen"
    title: "Bali Belly (Salud)"
    content: |
      - **Agua:** NUNCA beber del grifo. Cuidado con hielos en sitios muy locales.
      - **Botiquín:** Probióticos y Fortasec imprescindibles.
    type: "tip"

  - stop: "Día 1: Llegada a Sidemen"
    title: "Templos: Sarong"
    content: |
      Sarong obligatorio en todos los templos.
      Comprar uno el primer día (~5€).
      Respetar zonas de rezo.
    type: "tip"

  # === DÍA 2: TREKKING ARROZALES ===
  - stop: "Día 2: Trekking Arrozales Sidemen"
    title: "Trekking de Arrozales"
    content: |
      Caminar sin guía por los senderos del valle.
      Baño en el río al final.
      Vistas al Volcán Agung todo el recorrido.
      
      🔍 [Buscar en Google](https://www.google.com/search?q=Sidemen+rice+terrace+trekking+Bali)
    type: "activity"
    rating: 5
    duration: "3 hours"

