  - stop: "Día 11: Isla Menjangan Snorkel/Buceo"
    title: "Isla de Menjangan (Snorkel/Buceo)"
    content: |
      Paredes de coral verticales, abanicos gigantes, aguas cristalinas y cálidas.
      **Cero masificaciones** comparado con Nusa Penida.
      
      **Nota ética:** Parque Nacional protegido. 
      Estrictamente prohibido tocar coral o perseguir tortugas.
      Usar lycra en vez de mucha crema solar para proteger el agua.
      
      🔍 [Buscar en Google](https://www.google.com/search?q=Menjangan+Island+diving+snorkeling+Bali)
    type: "activity"
    rating: 5
    duration: "1 day"
    price: 60.00

  - stop: "Día 11: Isla Menjangan Snorkel/Buceo"
    title: "Coral: Ética"
    content: |
      No pisar nunca el coral.
      Usar escarpines si hay rocas, pero no caminar sobre el arrecife.
      Crema solar "Reef Safe" si es posible.
    type: "tip"

