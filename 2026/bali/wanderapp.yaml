title: "Bali 2026: Slow & Authentic"
start_date: "2026-07-30"
end_date: "2026-08-19"
description: |
  Viaje de 21 días por Bali con filosofía **"Menos Instagram, más Realidad"**.
  Evitando el sur masificado y Nusa Penida en favor de la autenticidad del norte y este.
  
  ## Highlights
  - Sidemen: Arrozales y cultura sin el caos de Ubud
  - Amed: Buceo y snorkel de clase mundial
  - Menjangan: El coral mejor conservado de Bali
  - Munduk: Fresco, cascadas y selva
public: true
budget_total: 3400.00
local_currency: "IDR"
stops:
  - name: "Sidemen"
    location: "Sidemen, Bali, Indonesia"
    visit_date: "2026-07-30"
    arrival_date: "2026-07-30"
    departure_date: "2026-08-03"
    notes: "Días 1-4: La llegada zen. Arrozales, cultura y Templo Besakih."
    latitude: -8.4667
    longitude: 115.5000
    activities:
      - title: "Visa on Arrival & Tips"
        content: |
          - VOA: 500k IDR (~30€).
          - Agua: Solo embotellada.
          - Transporte: App Grab/Gojek o conductor privado.
        type: "tip"
      - title: "Trekking Arrozales"
        content: "Caminar por el valle, baño en el río, vistas Agung."
        type: "activity"
        rating: 5
        duration: "3 hours"
      - title: "Clase de Cocina Balinesa"
        content: "Mercado local + cocinar Gado Gado y Sate Lilit."
        type: "activity"
        rating: 5
        price: 35.00
        duration: "4 hours"
      - title: "Templo Besakih (Templo Madre)"
        content: "El más sagrado. Ir 8:00 AM. Sarong obligatorio."
        type: "place"
        rating: 5
        duration: "3 hours"

  - name: "Amed"
    location: "Amed, Bali, Indonesia"
    visit_date: "2026-08-03"
    arrival_date: "2026-08-03"
    departure_date: "2026-08-08"
    notes: "Días 5-9: Costa Este. Snorkel, buceo en pecios y atardeceres frente al volcán."
    latitude: -8.3500
    longitude: 115.6500
    activities:
      - title: "Buceo USAT Liberty (Tulamben)"
        content: "Pecio WWII. Ir 6:30 AM para evitar grupos."
        type: "activity"
        rating: 5
        price: 40.00
        duration: "3 hours"
      - title: "Jemeluk Bay Snorkel"
        content: "Templo sumergido y coral desde la playa."
        type: "activity"
        rating: 5
      - title: "Sunset Blue Earth Village"
        content: "Mejor vista del volcán al atardecer."
        type: "place"
        rating: 5

  - name: "Pemuteran"
    location: "Pemuteran, Bali, Indonesia"
    visit_date: "2026-08-08"
    arrival_date: "2026-08-08"
    departure_date: "2026-08-13"
    notes: "Días 10-14: El norte tranquilo. Isla Menjangan y conservación marina."
    latitude: -8.1500
    longitude: 114.6167
    activities:
      - title: "Isla Menjangan (Snorkel)"
        content: "Parque Nacional. El mejor coral de Bali. Sin multitudes."
        type: "activity"
        rating: 5
        price: 60.00
        duration: "1 day"
      - title: "Proyecto Bio-Rock"
        content: "Arrecifes artificiales electrificados en la playa del hotel."
        type: "activity"
        rating: 5
      - title: "Pura Pulaki"
        content: "Templo de los monos junto al mar."
        type: "place"
        rating: 4

  - name: "Munduk"
    location: "Munduk, Bali, Indonesia"
    visit_date: "2026-08-13"
    arrival_date: "2026-08-13"
    departure_date: "2026-08-16"
    notes: "Días 15-17: Tierras altas. Cascadas, lagos gemelos y plantaciones de café."
    latitude: -8.2667
    longitude: 115.0833
    activities:
      - title: "Ruta de las Cascadas"
        content: "Red Coral y Golden Valley. Trekking por la selva."
        type: "activity"
        rating: 5
        duration: "4 hours"
      - title: "Lagos Gemelos (Tamblingan)"
        content: "Canoa tradicional en lago místico con templos."
        type: "activity"
        rating: 5
        price: 20.00

  - name: "Ubud"
    location: "Ubud, Bali, Indonesia"
    visit_date: "2026-08-16"
    arrival_date: "2026-08-16"
    departure_date: "2026-08-19"
    notes: "Días 18-21: Compras finales, masajes y gastronomía de despedida."
    latitude: -8.5069
    longitude: 115.2625
    activities:
      - title: "Ubud Art Market"
        content: "Artesanía y souvenirs. Regatear."
        type: "place"
        rating: 4
      - title: "Monkey Forest"
        content: "Bosque sagrado. Cuidado con las gafas."
        type: "place"
        rating: 3
      - title: "Cena Despedida (Locavore)"
        content: "Alta cocina con ingredientes locales. Reservar."
        type: "restaurant"
        rating: 5
        price: 80.00

