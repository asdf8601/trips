  # === DÍA 19: UBUD ART MARKET ===
  - stop: "Día 19: Ubud Art Market y Monkey Forest"
    title: "Ubud Art Market (Pasar Seni)"
    content: |
      Famoso por bolsos de ratán, artesanía en madera y ropa (sarongs).
      Perfecto para compras de última hora.
      
      **Tip:** Regatear, empezar en 30% del precio.
      
      🔍 [Buscar en Google](https://www.google.com/search?q=Ubud+Art+Market+Pasar+Seni+Bali)
    type: "place"
    rating: 4
    duration: "2 hours"

  - stop: "Día 19: Ubud Art Market y Monkey Forest"
    title: "Monkey Forest"
    content: |
      Bosque sagrado con macacos.
      Solo si os apetece (muy turístico).
      
      **Nota ética:** No llevar comida visible, cuidado con gafas y objetos brillantes.
      
      🔍 [Buscar en Google](https://www.google.com/search?q=Sacred+Monkey+Forest+Sanctuary+Ubud+Bali)
    type: "place"
    rating: 3
    duration: "1.5 hours"
    price: 8.00

  - stop: "Día 19: Ubud Art Market y Monkey Forest"
    title: "Karsa Spa"
    content: |
      Masaje final entre arrozales.
      Experiencia relajante antes de volver.
      
      🔍 [Buscar en Google](https://www.google.com/search?q=Karsa+Spa+Ubud+Bali)
    type: "activity"
    rating: 5
    duration: "2 hours"
    price: 30.00

  - stop: "Día 19: Ubud Art Market y Monkey Forest"
    title: "Aviso Kopi Luwak"
    content: |
      **Evitar el café de civeta (Luwak) en cafeterías turísticas.**
      Suele provenir de animales enjaulados y maltratados.
      
      Si queréis probarlo, buscar certificaciones éticas (muy raras).
    type: "tip"

