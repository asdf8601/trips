# Bali 2026: The "Anti-Crowd" Challenge (Slow & Authentic)
# Generado para importar en Wander App
# Estructura: UNA PARADA POR DÍA (21 días)

title: "Bali 2026: Slow & Authentic"
start_date: "2026-07-30"
end_date: "2026-08-19"
description: |
  Viaje de 21 días por Bali con filosofía **"Menos Instagram, más Realidad"**.
  
  ## Filosofía
  Se han eliminado los puntos negros de turismo masivo (Nusa Penida, tráfico del sur) 
  y se han sustituido por joyas tranquilas y auténticas.
  
  ## Highlights
  - Sidemen: La llegada zen entre arrozales reales
  - Amed: Buceo de clase mundial desde la orilla
  - Menjangan: La joya oculta, el mejor coral de la isla
  - Munduk: Fresco, cascadas y selva
  - Ubud: Solo lo imprescindible, alojándose fuera del centro
  
  ## Ruta
  Ruta circular empezando y terminando en Denpasar (DPS).
public: true
budget_total: 3400.00
local_currency: "IDR"

